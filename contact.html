<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer - Amare Getachew Haile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background-color: #f8f9fa;
        }

        .footer {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            padding: 30px 20px;
            text-align: center;
            border-top: 4px solid #e94560;
        }

        .footer-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .footer-name {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: #e94560;
            text-transform: uppercase;
        }

        .footer-divider {
            width: 80px;
            height: 2px;
            background-color: #e94560;
            margin: 0 auto 15px auto;
        }

        .footer-details {
            font-size: 15px;
            line-height: 1.8;
            color: #d1d1d1;
        }

        .footer-details span {
            color: #ffffff;
            font-weight: 500;
        }

        .footer-bottom {
            margin-top: 20px;
            font-size: 12px;
            color: #888888;
            letter-spacing: 0.5px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .footer-name {
                font-size: 18px;
            }
            .footer-details {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================ -->
    <!-- FOOTER - Amare Getachew Haile               -->
    <!-- ============================================ -->
    <footer class="footer">
        <div class="footer-container">

            <!-- Name -->
            <div class="footer-name">Amare Getachew Haile</div>
            <div class="footer-divider"></div>

            <!-- Details -->
            <div class="footer-details">
                <p>
                    <span>TIN:</span> 0051845324
                </p>
                <p>
                    <span>Kirkos Sub-city</span>, Woreda: 08, Kebele: 17/18, <span>House No:</span> 005
                </p>
                <p>
                    Addis Ababa, Ethiopia
                </p>
            </div>

            <!-- Bottom line -->
            <div class="footer-bottom">
                &copy; 2026 Amare Getachew Haile. All rights reserved.
            </div>

        </div>
    </footer>
    <!-- ============================================ -->

</body>
</html>
